<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>2048 Pro AI</title>

<style>
  body {
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #faf8ef;
    touch-action: none;
  }

  h1 { margin-top: 20px; }

  #board {
    width: 320px;
    height: 320px;
    background: #bbada0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-gap: 10px;
    padding: 10px;
    border-radius: 8px;
  }

  .cell {
    width: 70px;
    height: 70px;
    background: #cdc1b4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: bold;
    border-radius: 5px;

    transition: all 0.12s ease-in-out; /* ✨ smooth animation */
  }

  .tile-2 { background: #eee4da; }
  .tile-4 { background: #ede0c8; }
  .tile-8 { background: #f2b179; }
  .tile-16 { background: #f59563; }
  .tile-32 { background: #f67c5f; }
  .tile-64 { background: #f65e3b; }
  .tile-128 { background: #edcf72; }
  .tile-256 { background: #edcc61; }
  .tile-512 { background: #edc850; }
  .tile-1024 { background: #edc53f; }
  .tile-2048 { background: #edc22e; }

  button {
    cursor: pointer;
    margin-left: 5px;
  }
</style>
</head>

<body>

<h1>2048 Pro AI</h1>

<div style="display:flex; justify-content:space-between; width:320px; margin-bottom:10px;">
  <div>
    Score: <span id="score">0</span> |
    Best: <span id="best">0</span>
  </div>

  <div>
    <button onclick="restartGame()">Restart</button>
    <button onclick="toggleAI()">AI Play</button>
  </div>
</div>

<div id="message" style="height:20px; text-align:center; color:#776e65;"></div>

<div style="margin-bottom:10px; font-size:14px; color:#776e65; text-align:center;">
Use arrows or swipe (mobile supported)
</div>

<div id="board"></div>

<script>
let board, score = 0, gameOver = false;
let aiRunning = false;

function init() {
  board = Array(4).fill().map(() => Array(4).fill(0));
  score = 0;
  gameOver = false;
  document.getElementById("message").innerText = "";

  addRandom();
  addRandom();
  draw();
}

function getBest() {
  return Number(localStorage.getItem("best2048") || 0);
}

function setBest(val) {
  localStorage.setItem("best2048", val);
  document.getElementById("best").innerText = val;
}

function updateScore(val) {
  score = val;
  document.getElementById("score").innerText = score;
  if (score > getBest()) setBest(score);
}

function addRandom() {
  let empty = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (board[r][c] === 0) empty.push({r,c});

  if (!empty.length) return;

  let {r,c} = empty[Math.floor(Math.random() * empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function draw() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      let val = board[r][c];
      let div = document.createElement("div");
      div.className = "cell" + (val ? " tile-" + val : "");
      div.innerText = val || "";
      boardDiv.appendChild(div);
    }
  }
}

function slide(row) {
  row = row.filter(x => x);

  for (let i = 0; i < row.length - 1; i++) {
    if (row[i] === row[i + 1]) {
      row[i] *= 2;
      score += row[i];
      row[i + 1] = 0;
    }
  }

  row = row.filter(x => x);
  while (row.length < 4) row.push(0);

  updateScore(score);
  return row;
}

function moveLeft() {
  for (let r = 0; r < 4; r++) board[r] = slide(board[r]);
}

function moveRight() {
  for (let r = 0; r < 4; r++) board[r] = slide(board[r].reverse()).reverse();
}

function moveUp() {
  for (let c = 0; c < 4; c++) {
    let col = [];
    for (let r = 0; r < 4; r++) col.push(board[r][c]);
    col = slide(col);
    for (let r = 0; r < 4; r++) board[r][c] = col[r];
  }
}

function moveDown() {
  for (let c = 0; c < 4; c++) {
    let col = [];
    for (let r = 0; r < 4; r++) col.push(board[r][c]);
    col = slide(col.reverse()).reverse();
    for (let r = 0; r < 4; r++) board[r][c] = col[r];
  }
}

function checkGameOver() {
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      if (board[r][c] === 0) return false;
      if (c < 3 && board[r][c] === board[r][c + 1]) return false;
      if (r < 3 && board[r][c] === board[r + 1][c]) return false;
    }
  }
  return true;
}

document.addEventListener("keydown", e => {
  if (gameOver) return;
  e.preventDefault();

  let before = JSON.stringify(board);

  if (e.key === "ArrowLeft") moveLeft();
  if (e.key === "ArrowRight") moveRight();
  if (e.key === "ArrowUp") moveUp();
  if (e.key === "ArrowDown") moveDown();

  if (before !== JSON.stringify(board)) {
    addRandom();
    draw();
  }

  if (checkGameOver()) {
    gameOver = true;
    document.getElementById("message").innerText = "Game Over 😢";
  }
});

/* 📱 SWIPE SUPPORT */
let startX, startY;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  let dy = e.changedTouches[0].clientY - startY;

  if (Math.abs(dx) > Math.abs(dy)) {
    dx > 0 ? moveRight() : moveLeft();
  } else {
    dy > 0 ? moveDown() : moveUp();
  }

  addRandom();
  draw();
});

/* 🤖 SIMPLE AI */
function aiMove() {
  if (!aiRunning || gameOver) return;

  let moves = [moveLeft, moveRight, moveUp, moveDown];
  let move = moves[Math.floor(Math.random() * 4)];

  let before = JSON.stringify(board);
  move();

  if (before !== JSON.stringify(board)) {
    addRandom();
    draw();
  }

  if (checkGameOver()) {
    gameOver = true;
    document.getElementById("message").innerText = "Game Over 😢";
    return;
  }

  setTimeout(aiMove, 200);
}

function toggleAI() {
  aiRunning = !aiRunning;
  if (aiRunning) aiMove();
}

function restartGame() {
  init();
}

init();
document.getElementById("best").innerText = getBest();
</script>

</body>
</html>
