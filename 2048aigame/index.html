<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>2048 Game</title>
<style>
  body {
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #faf8ef;
  }

  h1 { margin-top: 20px; }

  #board {
    width: 320px;
    height: 320px;
    background: #bbada0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-gap: 10px;
    padding: 10px;
    border-radius: 8px;
  }

  .cell {
    width: 70px;
    height: 70px;
    background: #cdc1b4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: bold;
    border-radius: 5px;
  }

  .tile-2 { background: #eee4da; }
  .tile-4 { background: #ede0c8; }
  .tile-8 { background: #f2b179; }
  .tile-16 { background: #f59563; }
  .tile-32 { background: #f67c5f; }
  .tile-64 { background: #f65e3b; }
  .tile-128 { background: #edcf72; }
  .tile-256 { background: #edcc61; }
  .tile-512 { background: #edc850; }
  .tile-1024 { background: #edc53f; }
  .tile-2048 { background: #edc22e; }
</style>
</head>
<body>

<h1>2048 Game</h1>
  <div style="margin-bottom:10px; font-size:14px; color:#776e65; text-align:center;">
Move tiles with <b>arrow keys</b> (↑ ↓ ← →)
</div>
<div id="board"></div>

<script>
let board = Array(4).fill().map(() => Array(4).fill(0));

function addRandom() {
  let empty = [];
  for (let r=0;r<4;r++) {
    for (let c=0;c<4;c++) {
      if (board[r][c] === 0) empty.push({r,c});
    }
  }
  if (empty.length === 0) return;

  let {r,c} = empty[Math.floor(Math.random() * empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function draw() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  for (let r=0;r<4;r++) {
    for (let c=0;c<4;c++) {
      let val = board[r][c];
      let div = document.createElement("div");
      div.className = "cell" + (val ? " tile-" + val : "");
      div.innerText = val !== 0 ? val : "";
      boardDiv.appendChild(div);
    }
  }
}

function slide(row) {
  row = row.filter(x => x);
  for (let i=0;i<row.length-1;i++) {
    if (row[i] === row[i+1]) {
      row[i] *= 2;
      row[i+1] = 0;
    }
  }
  row = row.filter(x => x);
  while (row.length < 4) row.push(0);
  return row;
}

function moveLeft() {
  for (let r=0;r<4;r++) {
    board[r] = slide(board[r]);
  }
}

function moveRight() {
  for (let r=0;r<4;r++) {
    board[r] = slide(board[r].reverse()).reverse();
  }
}

function moveUp() {
  for (let c=0;c<4;c++) {
    let col = [];
    for (let r=0;r<4;r++) col.push(board[r][c]);
    col = slide(col);
    for (let r=0;r<4;r++) board[r][c] = col[r];
  }
}

function moveDown() {
  for (let c=0;c<4;c++) {
    let col = [];
    for (let r=0;r<4;r++) col.push(board[r][c]);
    col = slide(col.reverse()).reverse();
    for (let r=0;r<4;r++) board[r][c] = col[r];
  }
}

document.addEventListener("keydown", e => {
  let before = JSON.stringify(board);

  if (e.key === "ArrowLeft") moveLeft();
  if (e.key === "ArrowRight") moveRight();
  if (e.key === "ArrowUp") moveUp();
  if (e.key === "ArrowDown") moveDown();

  if (before !== JSON.stringify(board)) {
    addRandom();
    draw();
  }
});

addRandom();
addRandom();
draw();
</script>

</body>
</html>
